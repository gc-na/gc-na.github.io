<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- 배경 원 -->
  <circle cx="100" cy="100" r="95" fill="#0e76a8" />
  <circle cx="100" cy="100" r="85" fill="#ffffff" />
  
  <!-- 가운데 반도체 칩 아이콘 -->
  <g transform="translate(50, 50) scale(0.5)">
    <rect x="40" y="40" width="120" height="120" rx="5" fill="#0e76a8" />
    
    <!-- 칩의 선들 -->
    <line x1="40" y1="60" x2="20" y2="60" stroke="#0e76a8" stroke-width="5" />
    <line x1="40" y1="80" x2="20" y2="80" stroke="#0e76a8" stroke-width="5" />
    <line x1="40" y1="100" x2="20" y2="100" stroke="#0e76a8" stroke-width="5" />
    <line x1="40" y1="120" x2="20" y2="120" stroke="#0e76a8" stroke-width="5" />
    <line x1="40" y1="140" x2="20" y2="140" stroke="#0e76a8" stroke-width="5" />
    
    <line x1="160" y1="60" x2="180" y2="60" stroke="#0e76a8" stroke-width="5" />
    <line x1="160" y1="80" x2="180" y2="80" stroke="#0e76a8" stroke-width="5" />
    <line x1="160" y1="100" x2="180" y2="100" stroke="#0e76a8" stroke-width="5" />
    <line x1="160" y1="120" x2="180" y2="120" stroke="#0e76a8" stroke-width="5" />
    <line x1="160" y1="140" x2="180" y2="140" stroke="#0e76a8" stroke-width="5" />
    
    <line x1="60" y1="40" x2="60" y2="20" stroke="#0e76a8" stroke-width="5" />
    <line x1="80" y1="40" x2="80" y2="20" stroke="#0e76a8" stroke-width="5" />
    <line x1="100" y1="40" x2="100" y2="20" stroke="#0e76a8" stroke-width="5" />
    <line x1="120" y1="40" x2="120" y2="20" stroke="#0e76a8" stroke-width="5" />
    <line x1="140" y1="40" x2="140" y2="20" stroke="#0e76a8" stroke-width="5" />
    
    <line x1="60" y1="160" x2="60" y2="180" stroke="#0e76a8" stroke-width="5" />
    <line x1="80" y1="160" x2="80" y2="180" stroke="#0e76a8" stroke-width="5" />
    <line x1="100" y1="160" x2="100" y2="180" stroke="#0e76a8" stroke-width="5" />
    <line x1="120" y1="160" x2="120" y2="180" stroke="#0e76a8" stroke-width="5" />
    <line x1="140" y1="160" x2="140" y2="180" stroke="#0e76a8" stroke-width="5" />
    
    <!-- 내부 패턴 -->
    <rect x="60" y="60" width="20" height="20" fill="#ffffff" />
    <rect x1="90" y="60" width="20" height="20" fill="#ffffff" />
    <rect x1="120" y="60" width="20" height="20" fill="#ffffff" />
    
    <rect x="60" y="90" width="20" height="20" fill="#ffffff" />
    <rect x1="90" y="90" width="20" height="20" fill="#ffffff" />
    <rect x1="120" y="90" width="20" height="20" fill="#ffffff" />
    
    <rect x="60" y="120" width="20" height="20" fill="#ffffff" />
    <rect x1="90" y="120" width="20" height="20" fill="#ffffff" />
    <rect x1="120" y="120" width="20" height="20" fill="#ffffff" />
  </g>
  
  <!-- 텍스트 -->
  <text x="100" y="155" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#0e76a8">CHASE NA</text>
